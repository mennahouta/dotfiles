# ── Terminal ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 0
set -g history-limit 10000

# ── Prefix: Ctrl-b (default) ───────────────────────────────────────────────────
# Uncomment below to switch to Ctrl-a (screen-style)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ── Indexing: start at 1 (easier keyboard reach) ──────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Splits ────────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing (repeatable) ────────────────────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config reloaded"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 40

set -g status-style                bg=colour235,fg=colour244
set -g status-left                 "#[fg=colour2,bold] #S #[fg=colour238]│ "
set -g status-right                "#[fg=colour244] %H:%M  %d %b "
set -g window-status-format        " #I:#W "
set -g window-status-current-format "#[fg=colour2,bold] #I:#W "
set -g pane-border-style           fg=colour238
set -g pane-active-border-style    fg=colour2
set -g message-style               bg=colour235,fg=colour2
